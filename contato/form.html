<div class="contact-form">
  <form action="https://formspree.io/f/xpwzyqjr" method="POST">
    <div class="form-group">
      <label for="name">Nome Completo</label>
      <input type="text" name="name" id="name" placeholder="Seu nome" required>
    </div>
    <div class="form-group">
      <label for="email">Endereço de E-mail</label>
      <input type="email" name="_replyto" id="email" placeholder="seuemail@exemplo.com" required>
    </div>
    <div class="form-group">
      <label for="subject">Assunto</label>
      <input type="text" name="subject" id="subject" placeholder="Ex: Dúvida sobre o curso" required>
    </div>
    <div class="form-group">
      <label for="message">Mensagem</label>
      <textarea name="message" id="message" rows="5" placeholder="Escreva sua mensagem aqui..." required></textarea>
    </div>
    <button type="submit" class="btn-submit">Enviar Mensagem</button>
  </form>
</div>
